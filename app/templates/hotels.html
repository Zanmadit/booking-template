<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels</title>
</head>
<body>
    Hello world!
    <div>
        {% for hotel in hotels %}
        <div style="display:flex; margin-left: 10px">
            <img src="{{ url_for('static', path='images/' + hotel.image_id|string + '.webp') }}" 
            alt="Photo hotel" width="300">
            <h1>{{hotel.name}}</h1>
        </div>
        {% endfor %}
    </div>
</body>
</html>
